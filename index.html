<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simple Calculator">
    <meta name="keywords" content="HTML, CSS, Bootstrap, JavaScript">
    <meta name="author" content="Subin T S">
    <title>Simple Calculator</title>

    <!-- Bootstrap CDN Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- External CSS Link -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Header section -->
    <header>
        <h1 class="text-center py-4">Simple Calculator</h1>
    </header>
    <!-- Header section ends -->

    <!-- Main section -->
    <main>
       <div class="calculator-container bg-dark text-white">
           <div>
               <input type="text" id="display" readonly>
           </div>
           <div class="container  calculator-body">
             <div class="row gy-2">

                <!-- First row -->
                <div class="col-3 border">
                    <button >7</button>
                </div>

                 <div class="col-3 border">
                    <button >8</button>
                </div>

                 <div class="col-3 border">
                    <button >9</button>
                </div>

                 <div class="col-3 border">
                    <button >/</button>
                </div>

                <!-- Second row -->
                 <div class="col-3 border">
                    <button >4</button>
                </div>
                 <div class="col-3 border">
                    <button >5</button>
                </div>
                 <div class="col-3 border">
                    <button >6</button>
                </div>
                 <div class="col-3 border">
                    <button >*</button>
                </div>

                <!-- Third row -->
                 <div class="col-3 border">
                    <button >1</button>
                </div>
                 <div class="col-3 border">
                    <button >2</button>
                </div>
                 <div class="col-3 border">
                    <button >3</button>
                </div>
                 <div class="col-3 border">
                    <button >-</button>
                </div>

                <!-- Fourth row -->
                 <div class="col-3 border">
                    <button >0</button>
                </div>
                 <div class="col-3 border">
                    <button >C</button>
                </div>
                 <div class="col-3 border">
                    <button >=</button>
                </div>

                 <div class="col-3 border">
                    <button >+</button>
                </div>

                <!-- fifth row -->
                 <div class="col-3 border">
                    <button >x²</button>
                </div>
                 <div class="col-3 border">
                    <button >x³</button>
                </div>


             </div>
           </div>
       </div>
    </main>
    <!-- Main section ends -->

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- External JavaScript file -->
    <script src="js/scripts.js"></script>
</body>

</html>
